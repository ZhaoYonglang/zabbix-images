name: Export Zabbix Images
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and save images
        run: |
          docker pull zabbix/zabbix-server-mysql:ubuntu-6.4-latest
          docker pull zabbix/zabbix-web-nginx-mysql:ubuntu-6.4-latest
          docker save -o zabbix-6.4.tar \
            zabbix/zabbix-server-mysql:ubuntu-6.4-latest \
            zabbix/zabbix-web-nginx-mysql:ubuntu-6.4-latest
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zabbix-images
          path: zabbix-6.4.tar
